[pytest]
# pytest配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    unit: 单元测试
    property: 基于属性的测试
    integration: 集成测试
    slow: 运行时间较长的测试

# Hypothesis配置
hypothesis_profile = default
